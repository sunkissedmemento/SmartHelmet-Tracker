name: location_sms
description: Helmet collision alert app with BLE + GPS + SMS.

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  geolocator: ^11.0.0
  another_telephony: ^0.4.1
  permission_handler: ^11.3.0
  flutter_blue_plus: ^1.31.9

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true